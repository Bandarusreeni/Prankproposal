<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI System Scan...</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:black;
    color:#00ffcc;
    text-align:center;
}

/* center */
.center {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* buttons */
button {
    position:absolute;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}

#yesBtn { background:#00ffcc; }
#noBtn { background:red; color:white; }

/* glitch */
.glitch {
    animation: glitch 0.2s infinite;
}
@keyframes glitch {
    0%{transform:translate(2px,2px);}
    50%{transform:translate(-2px,-2px);}
    100%{transform:translate(2px,-2px);}
}

/* crazy ending */
.crazy-bg {
    background: linear-gradient(45deg, pink, yellow, cyan, violet);
    animation: bgMove 2s infinite alternate;
}
@keyframes bgMove {
    from{background-position:0%;}
    to{background-position:100%;}
}

/* floating chaos */
.float {
    position:absolute;
    font-size:32px;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* flash */
.flash {
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="screen" class="center">
    <h1>Booting AI Engine... 🤖</h1>
</div>

<div id="flash" class="flash"></div>

<audio id="bgMusic" autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<script>

let step = 0;

/* AI messages */
const msgs = [
"Scanning emotions... ❤️",
"Analyzing personality... 😏",
"Checking secrets... 🤫",
"Connecting to camera... 📷",
"Capturing reaction in 3... 2... 1..."
];

function runAI(){
    if(step < msgs.length){
        screen.innerHTML = `<h1>${msgs[step]}</h1>`;
        step++;
        setTimeout(runAI,1200);
    } else {
        fakeCamera();
    }
}

setTimeout(runAI,1000);

/* fake camera flash */
function fakeCamera(){
    let flash = document.getElementById("flash");
    flash.style.opacity="1";
    setTimeout(()=>flash.style.opacity="0",200);

    screen.innerHTML="<h1>📸 Photo Captured 😳</h1>";

    setTimeout(fakeChat,1500);
}

/* fake whatsapp chat */
function fakeChat(){
    screen.innerHTML = `
        <h2>Sending to Friends... 📤</h2>
        <p>Friend: 😂😂😂</p>
        <p>Friend: Bro she clicked YES 🤣</p>
        <p>Friend: Legendary 🤣🔥</p>
    `;

    setTimeout(showGame,2000);
}

/* game */
function showGame(){
    document.body.style.color="white";

    screen.innerHTML = `
        <h1>Catch YES 😈</h1>
        <p id="count">Attempts: 0</p>
        <button id="yesBtn">YES 😍</button>
        <button id="noBtn">NO 🙈</button>
    `;

    let count=0;

    const yesBtn=document.getElementById("yesBtn");
    const noBtn=document.getElementById("noBtn");
    const counter=document.getElementById("count");

    function move(btn){
        btn.style.left=Math.random()*(window.innerWidth-100)+"px";
        btn.style.top=Math.random()*(window.innerHeight-100)+"px";
    }

    yesBtn.onmouseover=()=>{
        move(yesBtn);
        count++;
        counter.innerText="Attempts: "+count;
    };

    noBtn.onmouseover=()=>{
        let x=noBtn.offsetLeft+(Math.random()*80-40);
        let y=noBtn.offsetTop+(Math.random()*80-40);
        noBtn.style.left=Math.max(0,Math.min(window.innerWidth-100,x))+"px";
        noBtn.style.top=Math.max(0,Math.min(window.innerHeight-50,y))+"px";
    };

    setInterval(()=>{
        document.body.classList.add("glitch");
        setTimeout(()=>document.body.classList.remove("glitch"),200);
    },2500);

    yesBtn.onclick=()=>{
        bgMusic.pause();

        document.body.className="crazy-bg";

        document.body.innerHTML=`
        <h1 style="font-size:70px;margin-top:20vh;">😂 APRIL FOOL 😂</h1>
        <p style="font-size:24px;">You tried ${count} times 🤣</p>

        <audio autoplay>
        <source src="https://www.soundjay.com/human/laughter-01.mp3">
        </audio>
        `;

        const items=["🌸","🌺","🌼","🎈","🐶","🐼","🐵","🐱","😂","💥"];

        setInterval(()=>{
            let el=document.createElement("div");
            el.className="float";
            el.innerHTML=items[Math.floor(Math.random()*items.length)];
            el.style.left=Math.random()*window.innerWidth+"px";
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),6000);
        },120);
    };
}

</script>

</body>
</html>
