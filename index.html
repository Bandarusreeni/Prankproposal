<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Checking...</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:black;
    color:#00ffcc;
    text-align:center;
}

/* Center */
.center {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* Buttons */
button {
    position:absolute;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}

#yesBtn { background:#00ffcc; color:black; }
#noBtn { background:red; color:white; }

/* Glitch */
.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% {transform:translate(2px,2px);}
    50% {transform:translate(-2px,-2px);}
    100% {transform:translate(2px,-2px);}
}

/* Crazy ending */
.crazy-bg {
    background: linear-gradient(45deg, pink, yellow, cyan, violet);
    animation: bgMove 2s infinite alternate;
}

@keyframes bgMove {
    from {background-position:0%;}
    to {background-position:100%;}
}

/* floating items */
.float {
    position:absolute;
    font-size:32px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div id="screen" class="center">
    <h1>Initializing system... 🔍</h1>
</div>

<audio id="bgMusic" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<script>

let step = 0;

/* Fake AI sequence */
const messages = [
"Scanning emotions... ❤️",
"Analyzing compatibility... 🤖",
"Checking honesty level... 😏",
"Accessing camera... 📷",
"WARNING: Feelings detected 💘",
"Final question loading..."
];

function nextMessage(){
    if(step < messages.length){
        document.getElementById("screen").innerHTML = `<h1>${messages[step]}</h1>`;
        step++;
        setTimeout(nextMessage, 1200);
    } else {
        showGame();
    }
}

setTimeout(nextMessage,1000);

/* Show prank game */
function showGame(){

    document.body.style.color="white";

    document.getElementById("screen").innerHTML = `
        <h1>Catch YES if you can 😈</h1>
        <p id="counter">Attempts: 0</p>
        <button id="yesBtn">YES 😍</button>
        <button id="noBtn">NO 🙈</button>
    `;

    let attempts = 0;

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const counter = document.getElementById("counter");

    function move(btn){
        let x = Math.random()*(window.innerWidth-100);
        let y = Math.random()*(window.innerHeight-100);
        btn.style.left = x+"px";
        btn.style.top = y+"px";
    }

    /* YES game */
    yesBtn.onmouseover = ()=>{
        move(yesBtn);
        attempts++;
        counter.innerText = "Attempts: " + attempts;
    };

    /* NO teasing */
    noBtn.onmouseover = ()=>{
        let x = noBtn.offsetLeft + (Math.random()*80 - 40);
        let y = noBtn.offsetTop + (Math.random()*80 - 40);

        x = Math.max(0, Math.min(window.innerWidth-100, x));
        y = Math.max(0, Math.min(window.innerHeight-50, y));

        noBtn.style.left = x+"px";
        noBtn.style.top = y+"px";
    };

    /* Random glitch scare */
    setInterval(()=>{
        document.body.classList.add("glitch");
        setTimeout(()=>document.body.classList.remove("glitch"),200);
    },2500);

    /* YES click (final trap) */
    yesBtn.onclick = ()=>{

        document.getElementById("bgMusic").pause();

        document.body.className="crazy-bg";

        document.body.innerHTML = `
            <h1 style="font-size:70px;margin-top:20vh;">😂 APRIL FOOL 😂</h1>
            <p style="font-size:24px;">You clicked YES after ${attempts} attempts 🤣</p>

            <audio autoplay>
                <source src="https://www.soundjay.com/human/laughter-01.mp3">
            </audio>
        `;

        /* chaos mode */
        const items = ["🌸","🌺","🌼","🎈","🐶","🐼","🐵","🐱","😂","💥"];

        setInterval(()=>{
            let el = document.createElement("div");
            el.className="float";
            el.innerHTML = items[Math.floor(Math.random()*items.length)];
            el.style.left=Math.random()*window.innerWidth+"px";
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),6000);
        },150);
    };
}

</script>

</body>
</html>
