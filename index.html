<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Something for You 😄</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(270deg, #ff6ec4, #7873f5, #42e695);
    background-size: 600% 600%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 25px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    width: 90%;
    max-width: 500px;
}

h1 {
    color: white;
    font-size: 36px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px #fff;
}

p {
    color: #fff;
    margin-bottom: 30px;
    font-size: 18px;
}

/* Buttons */
button {
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 15px #00ffcc;
}

#yesBtn:hover {
    transform: scale(1.1);
}

#noBtn {
    position: absolute;
    background: #ff4d6d;
    color: white;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: white;
    font-size: 18px;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* Balloons */
.balloon {
    position: absolute;
    width: 40px;
    height: 55px;
    border-radius: 50%;
    animation: rise 7s linear infinite;
}

@keyframes rise {
    from {transform: translateY(100vh);}
    to {transform: translateY(-20vh);}
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    from {transform: translateY(-10vh);}
    to {transform: translateY(100vh);}
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1>Hey You 😏</h1>
        <p>I have something important to ask...</p>

        <button id="yesBtn">Yes 😍</button>
        <button id="noBtn">No 🙈</button>
    </div>
</div>

<audio id="music" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<script>

/* NO BUTTON TEASING */
const noBtn = document.getElementById("noBtn");

document.addEventListener("mousemove", (e) => {
    const rect = noBtn.getBoundingClientRect();

    const dist = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(dist < 120){
        noBtn.style.left = Math.random()*window.innerWidth + "px";
        noBtn.style.top = Math.random()*window.innerHeight + "px";
    }
});

/* YES CLICK */
document.getElementById("yesBtn").onclick = () => {

    document.getElementById("music").pause();

    // Confetti burst
    for(let i=0;i<100;i++){
        let c = document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*window.innerWidth+"px";
        c.style.background=["red","yellow","blue","white"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }

    setTimeout(()=>{
        document.body.innerHTML = `
        <div style="height:100vh;display:flex;justify-content:center;align-items:center;background:black;color:white;flex-direction:column;">
            <h1 style="font-size:60px;">😂 APRIL FOOL 😂</h1>
            <p style="font-size:22px;">You really clicked YES 🤣</p>
            <audio autoplay>
                <source src="https://www.soundjay.com/human/laughter-01.mp3">
            </audio>
        </div>`;
    },1500);
};

/* Hearts */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

/* Balloons */
setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*window.innerWidth+"px";
    b.style.background=["#ff4d6d","#ffd93d","#6bcBef","#c77dff"][Math.floor(Math.random()*4)];
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),7000);
},800);

</script>

</body>
</html>
