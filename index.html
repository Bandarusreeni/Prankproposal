<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
        overflow: hidden;
        text-align: center;
    }

    h1 {
        margin-top: 50px;
        font-size: 50px;
        color: white;
        text-shadow: 2px 2px 10px red;
    }

    .container {
        position: relative;
        height: 100vh;
    }

    .photo {
        margin-top: 20px;
        border-radius: 20px;
        width: 300px;
        height: 300px;
        object-fit: cover;
        border: 5px solid white;
    }

    .buttons {
        margin-top: 40px;
    }

    button {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    #yesBtn {
        background-color: #ff4d6d;
        color: white;
    }

    #noBtn {
        position: absolute;
        background-color: gray;
        color: white;
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: red;
        font-size: 24px;
        animation: float 5s infinite;
    }

    @keyframes float {
        from {transform: translateY(100vh);}
        to {transform: translateY(-10vh);}
    }
</style>
</head>
<body>

<div class="container" id="main">
    <h1>I Love You ❤️</h1>

    <!-- Replace image URL with your couple photo -->
    <img src="https://via.placeholder.com/300" class="photo">

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");

    // Make "No" button run away
    document.addEventListener("mousemove", function(e) {
        const rect = noBtn.getBoundingClientRect();
        const distance = Math.hypot(
            e.clientX - (rect.left + rect.width / 2),
            e.clientY - (rect.top + rect.height / 2)
        );

        if (distance < 100) {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }
    });

    // Yes button click
    document.getElementById("yesBtn").onclick = function() {
        document.body.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:black;color:white;font-size:50px;flex-direction:column;">
                😂 April Fool 😂
                <audio autoplay>
                    <source src="https://www.soundjay.com/human/laughter-01.mp3" type="audio/mpeg">
                </audio>
            </div>
        `;
    };

    // Create floating hearts
    function createHearts() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHearts, 300);
</script>

</body>
</html>
